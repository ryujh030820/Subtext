<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 270" role="img" aria-labelledby="title desc">
  <title>Subtext icon</title>
  <desc>Minimal modern Subtext icon representing hidden meaning under text.</desc>

  <defs>
    <style>
      .bg { fill: #6F3FF5; }
      .stroke { stroke: #FFFFFF; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .white { fill: #FFFFFF; }
      .sub { opacity: 0.55; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="270" height="270" rx="72" ry="72"/>
  <line class="stroke" x1="60" y1="110" x2="210" y2="110"/>
  <line class="stroke" x1="60" y1="145" x2="170" y2="145"/>
  <line class="stroke sub" x1="60" y1="185" x2="210" y2="185"/>
  <rect class="white" x="60" y="200" width="70" height="10" rx="5"/>
</svg>
